<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lens selection diagnostic gauge">
  <defs>
    <radialGradient id="panelGlow" cx="50%" cy="82%" r="62%">
      <stop offset="0%" stop-color="#14231d" stop-opacity=".92"/>
      <stop offset="42%" stop-color="#07110d" stop-opacity=".94"/>
      <stop offset="100%" stop-color="#020706" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="healthyGrad" x1="165" y1="260" x2="345" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#44d85b"/>
      <stop offset=".62" stop-color="#78ff5d"/>
      <stop offset="1" stop-color="#b7ff58"/>
    </linearGradient>

    <linearGradient id="watchGrad" x1="350" y1="70" x2="650" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c9ab32"/>
      <stop offset=".5" stop-color="#ffd54d"/>
      <stop offset="1" stop-color="#f4b941"/>
    </linearGradient>

    <linearGradient id="riskGrad" x1="650" y1="70" x2="840" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#cd403c"/>
      <stop offset=".5" stop-color="#ff5b50"/>
      <stop offset="1" stop-color="#ff3f38"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".55"/>
    </filter>

    <filter id="needleGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff5b50" flood-opacity=".38"/>
    </filter>

    <style>
      .title-small { fill: rgba(128,255,170,.82); font: 800 11px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 1.7px; }
      .title-main { fill: rgba(255,255,255,.92); font: 900 18px system-ui, -apple-system, Segoe UI, sans-serif; }
      .zone-label { fill: rgba(255,255,255,.86); font: 900 12px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 1px; }
      .zone-sub { fill: rgba(255,255,255,.62); font: 800 10px system-ui, -apple-system, Segoe UI, sans-serif; }
      .axis { fill: rgba(255,255,255,.52); font: 800 10px system-ui, -apple-system, Segoe UI, sans-serif; }
      .callout-value { fill: #fff; font: 950 22px system-ui, -apple-system, Segoe UI, sans-serif; }
      .callout-label { fill: rgba(255,255,255,.58); font: 900 9px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 1px; }
      .chip-k { fill: rgba(128,255,170,.76); font: 900 9px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 1px; }
      .chip-v { fill: rgba(255,255,255,.9); font: 900 14px system-ui, -apple-system, Segoe UI, sans-serif; }
      .tick { stroke: rgba(255,255,255,.20); stroke-linecap: round; }
      .tick.minor { stroke-width: 1; opacity: .35; }
      .tick.major { stroke-width: 1.5; opacity: .70; }
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="428" rx="22" fill="url(#panelGlow)" stroke="rgba(255,255,255,.08)"/>

  <text x="34" y="38" class="title-small">RESULTS OVERVIEW</text>
  <text x="34" y="64" class="title-main">Lens Selection Pressure</text>
  <text x="785" y="38" class="title-small">CURRENT PRESSURE</text>
  <text x="785" y="64" fill="#78ff98" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-weight="950" font-size="14">75 / 100</text>

  <path d="M 177.0 345.0 A 323 323 0 0 1 823.0 345.0 L 715.0 345.0 A 215 215 0 0 0 285.0 345.0 Z" fill="rgba(255,255,255,.04)" filter="url(#softShadow)"/>
  <path d="M 158.0 345.0 A 342 342 0 0 1 842.0 345.0" stroke="rgba(255,255,255,.045)" stroke-width="2"/>
  <path d="M 310.0 345.0 A 190 190 0 0 1 690.0 345.0" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="5 9"/>

  <path d="M 195.0 345.0 A 305 305 0 0 1 385.7 62.2 L 413.1 129.9 A 232 232 0 0 0 268.0 345.0 Z" fill="url(#healthyGrad)" opacity=".98"/>
  <path d="M 385.7 62.2 A 305 305 0 0 1 614.3 62.2 L 586.9 129.9 A 232 232 0 0 0 413.1 129.9 Z" fill="url(#watchGrad)" opacity=".98"/>
  <path d="M 614.3 62.2 A 305 305 0 0 1 805.0 345.0 L 732.0 345.0 A 232 232 0 0 0 586.9 129.9 Z" fill="url(#riskGrad)" opacity=".98"/>

  <path d="M 195.0 345.0 A 305 305 0 0 1 385.7 62.2 L 413.1 129.9 A 232 232 0 0 0 268.0 345.0 Z" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
  <path d="M 385.7 62.2 A 305 305 0 0 1 614.3 62.2 L 586.9 129.9 A 232 232 0 0 0 413.1 129.9 Z" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="1"/>
  <path d="M 614.3 62.2 A 305 305 0 0 1 805.0 345.0 L 732.0 345.0 A 232 232 0 0 0 586.9 129.9 Z" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="1"/>

  <line class="tick major" x1="298.0" y1="345.0" x2="278.0" y2="345.0"/><line class="tick minor" x1="291.6" y1="312.0" x2="280.7" y2="310.3"/><line class="tick minor" x1="299.3" y1="279.8" x2="288.9" y2="276.4"/><line class="tick minor" x1="312.0" y1="249.2" x2="302.2" y2="244.2"/><line class="tick minor" x1="329.3" y1="221.0" x2="320.4" y2="214.5"/><line class="tick major" x1="357.2" y1="202.2" x2="343.0" y2="188.0"/><line class="tick minor" x1="376.0" y1="174.3" x2="369.5" y2="165.4"/><line class="tick minor" x1="404.2" y1="157.0" x2="399.2" y2="147.2"/><line class="tick minor" x1="434.8" y1="144.3" x2="431.4" y2="133.9"/><line class="tick minor" x1="467.0" y1="136.6" x2="465.3" y2="125.7"/><line class="tick major" x1="500.0" y1="143.0" x2="500.0" y2="123.0"/><line class="tick minor" x1="533.0" y1="136.6" x2="534.7" y2="125.7"/><line class="tick minor" x1="565.2" y1="144.3" x2="568.6" y2="133.9"/><line class="tick minor" x1="595.8" y1="157.0" x2="600.8" y2="147.2"/><line class="tick minor" x1="624.0" y1="174.3" x2="630.5" y2="165.4"/><line class="tick major" x1="642.8" y1="202.2" x2="657.0" y2="188.0"/><line class="tick minor" x1="670.7" y1="221.0" x2="679.6" y2="214.5"/><line class="tick minor" x1="688.0" y1="249.2" x2="697.8" y2="244.2"/><line class="tick minor" x1="700.7" y1="279.8" x2="711.1" y2="276.4"/><line class="tick minor" x1="708.4" y1="312.0" x2="719.3" y2="310.3"/><line class="tick major" x1="702.0" y1="345.0" x2="722.0" y2="345.0"/>

  <text x="270" y="186" class="zone-label" text-anchor="middle">HEALTHY</text>
  <text x="270" y="205" class="zone-sub" text-anchor="middle">0?8 mm</text>

  <text x="500" y="116" class="zone-label" text-anchor="middle">WATCH</text>
  <text x="500" y="135" class="zone-sub" text-anchor="middle">8?18 mm</text>

  <text x="730" y="186" class="zone-label" text-anchor="middle">RISK</text>
  <text x="730" y="205" class="zone-sub" text-anchor="middle">&gt;18 mm</text>

  <text x="183" y="367" class="axis" text-anchor="middle">0 mm</text>
  <text x="360" y="94" class="axis" text-anchor="middle">8 mm</text>
  <text x="640" y="94" class="axis" text-anchor="middle">18 mm</text>
  <text x="817" y="367" class="axis" text-anchor="middle">40 mm</text>

  <line x1="500" y1="345" x2="595.8" y2="141.4" stroke="rgba(255,255,255,.92)" stroke-width="6" stroke-linecap="round" filter="url(#needleGlow)"/>
  <circle cx="595.8" cy="141.4" r="8" fill="#ff5b50" stroke="#fff" stroke-width="2" filter="url(#redGlow)"/>
  <circle cx="500" cy="345" r="12" fill="rgba(255,255,255,.94)"/>
  <circle cx="500" cy="345" r="5" fill="#06100c"/>

  <g filter="url(#redGlow)">
    <rect x="708" y="95" width="162" height="70" rx="12" fill="rgba(4,10,8,.92)" stroke="rgba(255,98,91,.74)"/>
    <text x="732" y="126" class="callout-value">25.6 mm</text>
    <text x="732" y="149" class="callout-label">CURRENT READING</text>
  </g>

  <g>
    <rect x="42" y="378" width="202" height="34" rx="10" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.075)"/>
    <text x="58" y="399" class="chip-k">COMFORT BAND</text>
    <text x="168" y="399" class="chip-v">8?18 mm</text>

    <rect x="264" y="378" width="202" height="34" rx="10" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.075)"/>
    <text x="280" y="399" class="chip-k">CURRENT</text>
    <text x="370" y="399" class="chip-v">25.6 mm</text>

    <rect x="486" y="378" width="202" height="34" rx="10" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.075)"/>
    <text x="502" y="399" class="chip-k">MARGIN</text>
    <text x="588" y="399" class="chip-v">+7.6 mm</text>

    <rect x="708" y="378" width="202" height="34" rx="10" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.075)"/>
    <text x="724" y="399" class="chip-k">STATUS</text>
    <text x="804" y="399" class="chip-v">RISK</text>
  </g>
</svg>
