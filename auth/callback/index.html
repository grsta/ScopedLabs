<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <title>Signing you in…</title>
  <meta name="description" content="ScopedLabs sign-in callback page used to finish secure account authentication and return users to the site." />
  <link rel="stylesheet" href="/assets/style.css?v=nav-tabs-023" />
</head>
<body>
  <main class="container">
    <section class="hero hero--tight">
      <h1 class="h1">Signing you in…</h1>
      <p class="subhead">
        ScopedLabs is finishing your sign-in. If this page does not redirect automatically,
        return to your account page and try again.
      </p>
      <div class="btn-row">
        <a class="btn btn-primary" href="/account/">Go to account</a>
        <a class="btn btn-ghost" href="/tools/">Browse tools</a>
      </div>
    </section>
  </main>
  <p>Signing you in…</p>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = window.__SUPABASE_URL__ || "";   // if you already inject these somewhere
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || "";

    // If you already have a global supabase client in /assets/app.js, use that instead.
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // PKCE / "code" flow (modern default)
    const { data, error } = await supabase.auth.exchangeCodeForSession(window.location.href);

    if (error) {
      console.error("Auth callback error:", error);
      window.location.href = "/upgrade/?err=auth_callback";
    } else {
      // Optional: return user to where they were trying to go (category purchase)
      const url = new URL(window.location.href);
      const next = url.searchParams.get("next") || "/tools/";
      window.location.href = next;
    }
  </script>
  <footer class="site-footer">
    <div class="muted">© <span data-year></span> ScopedLabs</div>
    <div class="footer-links">
      <a href="/tools/">Tools</a>
      <a href="/upgrade/">Upgrade</a>
      <a href="/about/">About</a>
      <a href="/contact/">Contact</a>
      <a href="/changelog/">Changelog</a>
        <a href="/privacy/">Privacy</a>
        <a href="/terms/">Terms</a>
        <a href="/disclaimer/">Disclaimer</a>
    </div>
  </footer>
</body>
</html>
