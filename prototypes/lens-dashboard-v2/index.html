<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lens Diagnostic Prototype | ScopedLabs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #06100c;
      --panel: rgba(255,255,255,.055);
      --line: rgba(255,255,255,.11);
      --text: rgba(255,255,255,.95);
      --muted: rgba(255,255,255,.68);
      --green: #69ff9b;
      --yellow: #ffd15d;
      --red: #ff6256;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(95,255,156,.14), transparent 32%),
        radial-gradient(circle at 82% 4%, rgba(255,86,72,.12), transparent 30%),
        linear-gradient(180deg, #081810, #020807 70%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 28px;
    }

    .prototype-frame {
      max-width: 1220px;
      margin: 0 auto;
    }

    .prototype-note {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .slp-shell {
      border: 1px solid rgba(105,255,155,.18);
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 0%, rgba(95,255,156,.16), transparent 34%),
        radial-gradient(circle at 88% 8%, rgba(255,98,86,.13), transparent 30%),
        linear-gradient(180deg, rgba(6,20,14,.98), rgba(2,8,7,.99));
      box-shadow:
        0 32px 90px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.055);
    }

    .slp-header {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 18px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.22);
    }

    .slp-kicker,
    .slp-panel-kicker,
    .slp-detail-kicker {
      color: rgba(105,255,155,.86);
      font-size: .72rem;
      font-weight: 950;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .slp-header h1 {
      margin: 7px 0 0;
      font-size: clamp(1.45rem, 2vw, 2.15rem);
      line-height: 1.05;
    }

    .slp-header p {
      margin: 10px 0 0;
      max-width: 860px;
      color: var(--muted);
      line-height: 1.6;
    }

    .slp-status {
      align-self: start;
      border: 1px solid rgba(255,98,86,.42);
      border-radius: 999px;
      padding: 10px 16px;
      color: #fff;
      background: rgba(255,98,86,.16);
      font-size: .8rem;
      font-weight: 950;
      letter-spacing: .12em;
    }

    .slp-main {
      display: grid;
      grid-template-columns: 250px minmax(0,1fr) 310px;
      gap: 16px;
      padding: 18px;
    }

    .slp-panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.028));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .slp-summary,
    .slp-guidance,
    .slp-gauge-card,
    .slp-detail {
      padding: 17px;
    }

    .slp-risk-card {
      margin-top: 12px;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(135deg, #f0443c, #8c1f25);
      box-shadow: 0 18px 38px rgba(240,68,60,.18);
    }

    .slp-risk-card span,
    .slp-mini span,
    .slp-result span,
    .slp-current span,
    .slp-footer-grid span {
      display: block;
      color: rgba(255,255,255,.62);
      font-size: .75rem;
      margin-bottom: 5px;
    }

    .slp-risk-card strong {
      font-size: 1.55rem;
      letter-spacing: .1em;
    }

    .slp-summary p,
    .slp-guidance p {
      color: var(--muted);
      line-height: 1.58;
    }

    .slp-mini-grid {
      display: grid;
      gap: 10px;
      margin-top: 15px;
    }

    .slp-mini,
    .slp-result,
    .slp-footer-grid > div {
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 15px;
      background: rgba(0,0,0,.22);
      padding: 12px;
    }

    .slp-mini strong,
    .slp-result strong,
    .slp-footer-grid strong {
      color: #fff;
      line-height: 1.25;
    }

    .slp-card-head {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 14px;
      align-items: start;
    }

    .slp-card-head h2,
    .slp-guidance h2,
    .slp-detail h3 {
      margin: 7px 0 0;
      color: #fff;
    }

    .slp-current {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 15px;
      background: rgba(0,0,0,.24);
      padding: 12px 14px;
      text-align: right;
    }

    .slp-current strong {
      font-size: 1.45rem;
    }

    .slp-gauge-svg {
      width: 100%;
      display: block;
      margin: 12px auto 0;
      max-height: 330px;
    }

    .slp-arc {
      fill: none;
      stroke-width: 28;
      stroke-linecap: round;
    }

    .slp-arc-healthy {
      stroke: var(--green);
      filter: url(#slpGlow);
    }

    .slp-arc-watch {
      stroke: var(--yellow);
    }

    .slp-arc-risk {
      stroke: var(--red);
      filter: url(#slpGlow);
    }

    .slp-arc-bg {
      fill: none;
      stroke: rgba(255,255,255,.055);
      stroke-width: 42;
      stroke-linecap: round;
    }

    .slp-needle {
      stroke: #fff;
      stroke-width: 7;
      stroke-linecap: round;
      filter: url(#slpGlow);
    }

    .slp-hub {
      fill: #10251a;
      stroke: rgba(255,255,255,.28);
      stroke-width: 3;
    }

    .slp-hub-dot {
      fill: #fff;
    }

    .slp-zone {
      fill: rgba(255,255,255,.75);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .slp-zone-healthy {
      fill: var(--green);
    }

    .slp-zone-watch {
      fill: var(--yellow);
    }

    .slp-zone-risk {
      fill: var(--red);
    }

    .slp-reading {
      fill: #fff;
      font-size: 32px;
      font-weight: 950;
    }

    .slp-reading-label {
      fill: rgba(255,255,255,.64);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .slp-results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .slp-chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    .slp-chip-grid button {
      border: 1px solid rgba(105,255,155,.24);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.9);
      padding: 9px 12px;
      font-size: .82rem;
      font-weight: 850;
      cursor: pointer;
    }

    .slp-chip-grid button:hover,
    .slp-chip-grid button.is-active {
      background: rgba(105,255,155,.17);
      border-color: rgba(105,255,155,.48);
      color: #fff;
    }

    .slp-detail {
      margin: 0 18px 18px;
    }

    .slp-detail h3 {
      margin-bottom: 10px;
    }

    .slp-detail p,
    .slp-list {
      color: var(--muted);
      line-height: 1.72;
    }

    .slp-list {
      margin: 0;
      padding-left: 20px;
    }

    .slp-list li + li {
      margin-top: 4px;
    }

    .slp-footer-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }

    @media (max-width: 1060px) {
      .slp-main,
      .slp-footer-grid {
        grid-template-columns: 1fr;
      }

      .slp-results {
        grid-template-columns: 1fr;
      }

      .slp-header,
      .slp-card-head {
        grid-template-columns: 1fr;
      }

      .slp-current {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="prototype-frame">
    <p class="prototype-note">
      Standalone visual prototype only. This page is isolated from the live Lens Selection tool.
    </p>

    <div id="lens-gauge-prototype"></div>
  </div>

  <script src="/assets/prototypes/lens-planner-gauge.js?v=lens-prototype-001"></script>
</body>
</html>
