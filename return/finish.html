<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScopedLabs — Unlock Complete</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  background:#0b0e12;
  color:#e6edf3;
  font-family:system-ui,Segoe UI,Roboto,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  background:#12161c;
  border:1px solid #1f2730;
  padding:40px;
  border-radius:10px;
  text-align:center;
  width:420px;
}

h1{
  font-size:24px;
  margin-bottom:15px;
}

p{
  opacity:.8;
}

.spinner{
  margin-top:20px;
  border:3px solid #1f2730;
  border-top:3px solid #00ff9c;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin-left:auto;
  margin-right:auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

button{
  margin-top:25px;
  padding:10px 18px;
  background:#00ff9c;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<h1>Upgrade Successful</h1>

<p id="status">
Confirming your unlock…
</p>

<div class="spinner"></div>

<button id="continue" style="display:none;">
Continue to tools
</button>

</div>

<script>

const params = new URLSearchParams(location.search);
const category = params.get("category");

async function checkUnlock(){

  try{

    const token =
      JSON.parse(localStorage.getItem("supabase.auth.token") || "{}")
      ?.currentSession?.access_token;

    if(!token){
      document.getElementById("status").textContent =
        "Please sign in to continue.";
      return;
    }

    const r = await fetch(
      "/api/unlocks/has?category=" + encodeURIComponent(category),
      {
        headers:{
          Authorization:"Bearer " + token
        }
      }
    );

    const data = await r.json();

    if(data.ok && data.has){

      document.getElementById("status").textContent =
        "Your tools are unlocked.";

      setTimeout(()=>{
        location.href = "/tools/" + category + "/";
      },1200);

      return;
    }

    document.getElementById("status").textContent =
      "Payment received. Finalizing access…";

  }catch(err){

    console.error(err);

    document.getElementById("status").textContent =
      "There was a problem confirming your unlock.";

    document.getElementById("continue").style.display="inline-block";

  }

}

document.getElementById("continue").onclick = ()=>{
  location.href = "/tools/" + category + "/";
};

checkUnlock();

</script>

</body>
</html>
