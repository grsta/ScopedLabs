<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ScopedLabs — Finishing…</title>

  <link rel="stylesheet" href="/assets/style.css?v=return-0305a" />
  <script defer src="/assets/auth.js?v=return-0305a"></script>

  <style>
    .wrap { max-width: 760px; margin: 0 auto; padding: 40px 16px; }
    .card { margin-top: 18px; }
    .big { font-size: 20px; font-weight: 700; }
    .muted { opacity: .8; }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: rgba(255,255,255,.85);
      display: inline-block;
      animation: spin 1s linear infinite;
      vertical-align: -3px;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <span class="brand-dot"></span>
        <span>ScopedLabs</span>
      </a>
      <nav class="nav">
        <a href="/tools/">Tools</a>
        <a href="/account/">Account</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="card tool-card">
      <div class="big"><span class="spinner" aria-hidden="true"></span>Finishing your unlock…</div>
      <p id="sl-msg" class="muted" style="margin-top:10px;">
        Checking your purchase and enabling Pro access.
      </p>

      <div class="muted" style="margin-top:14px;">
        Category: <code id="sl-cat">—</code>
      </div>

      <div class="muted" style="margin-top:10px;">
        If this takes more than a few seconds, keep this tab open — it will redirect automatically.
      </div>

      <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">
        <a class="btn" href="/account/">Go to Account</a>
        <a class="btn btn-primary" id="sl-tools" href="/tools/">Go to Tools</a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      const msgEl = document.getElementById("sl-msg");
      const catEl = document.getElementById("sl-cat");
      const toolsBtn = document.getElementById("sl-tools");

      const qs = new URLSearchParams(location.search);
      const category = (qs.get("category") || "").trim().toLowerCase();
      catEl.textContent = category || "—";

      // Where we send them after unlock is detected
      const fallbackTools = "/tools/";
      const targetTools = category ? `/tools/${encodeURIComponent(category)}/` : fallbackTools;
      toolsBtn.href = targetTools;

      // Basic guard: no category -> send to upgrade
      if (!category) {
        msgEl.textContent = "Missing category. Redirecting to upgrade…";
        setTimeout(() => { location.replace("/upgrade/#checkout"); }, 1200);
        return;
      }

      // Wait for auth.js to be ready and session to exist
      function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

      async function waitForAuthReady(timeoutMs = 8000) {
        const start = Date.now();
        while (Date.now() - start < timeoutMs) {
          if (window.SL_AUTH && window.SL_AUTH.sb && window.SL_AUTH.ready) return true;
          await sleep(50);
        }
        return false;
      }

      async function getSession(sb) {
        try {
          const { data } = await sb.auth.getSession();
          return data && data.session ? data.session : null;
        } catch {
          return null;
        }
      }

      async function pollUnlock(sb, token, category) {
        const start = Date.now();
        const timeoutMs = 45000;          // total patience
        const fastMs = 9000;              // fast poll window
        let tries = 0;

        while (Date.now() - start < timeoutMs) {
          tries++;

          msgEl.textContent =
            tries <= 2
              ? "Checking purchase…"
              : "Enabling Pro access…";

          try {
            const r = await fetch(`/api/unlocks/has?category=${encodeURIComponent(category)}`, {
              headers: { Authorization: `Bearer ${token}` }
            });

            if (r.ok) {
              const j = await r.json();
              if (j && j.ok && j.has === true) return true;
            }
          } catch {}

          // Backoff: fast early, slower later
          const elapsed = Date.now() - start;
          if (elapsed < fastMs) await sleep(700);
          else await sleep(1500);
        }
        return false;
      }

      (async () => {
        const ok = await waitForAuthReady();
        if (!ok) {
          msgEl.textContent = "Auth not ready. Redirecting to upgrade…";
          setTimeout(() => { location.replace(`/upgrade/?category=${encodeURIComponent(category)}#checkout`); }, 1400);
          return;
        }

        // Wait for auth.js internal ready promise (your existing pattern)
        try { await window.SL_AUTH.ready; } catch {}

        const sb = window.SL_AUTH.sb;
        const session = await getSession(sb);

        if (!session || !session.access_token) {
          msgEl.textContent = "You’re not signed in. Redirecting to upgrade to sign in…";
          setTimeout(() => { location.replace(`/upgrade/?category=${encodeURIComponent(category)}#checkout`); }, 1400);
          return;
        }

        // Poll until entitlement is visible
        const found = await pollUnlock(sb, session.access_token, category);

        if (found) {
          msgEl.textContent = "Unlocked. Redirecting…";
          // Use replace so back button doesn’t re-run finish page
          setTimeout(() => { location.replace(targetTools); }, 650);
          return;
        }

        // Timeout fallback
        msgEl.textContent =
          "We couldn’t confirm the unlock yet. It may still be processing. You can open Account to verify, or try Tools.";
      })();
    })();
  </script>
</body>
</html>
