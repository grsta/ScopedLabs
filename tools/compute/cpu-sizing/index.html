<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>CPU Sizing Estimator • ScopedLabs</title>
  <link rel="stylesheet" href="/assets/style.css?v=cpu-pipeline-002" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    window.SL_SUPABASE_URL = "https://ybnzjtuecirzajraddft.supabase.co";
    window.SL_SUPABASE_ANON_KEY = "YOUR_KEY";
  </script>

  <script defer src="/assets/auth.js?v=0403"></script>
  <script defer src="/assets/app.js?v=0403"></script>
</head>

<body data-tier="free" data-category="compute" data-step="cpu-sizing" data-lane="v1">

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">
      <span class="brand-dot"></span>
      <span class="brand-text">ScopedLabs</span>
    </a>

    <nav class="site-nav">
      <a class="nav-pill" href="/">Home</a>
      <a class="nav-pill" href="/tools/">Tools</a>
      <a class="nav-pill" href="/tools/compute/">Compute</a>
    </nav>
  </div>
</header>

<main class="container page">

  <h1>CPU Sizing Estimator</h1>

  <div id="pipeline"></div>

  <div id="flow-note" class="card" style="display:none;"></div>

  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field">
        <span class="label">Workload</span>
        <select id="workload">
          <option value="general">General</option>
          <option value="web">Web</option>
          <option value="db">Database</option>
          <option value="video">Video</option>
          <option value="compute">Compute Heavy</option>
        </select>
      </label>

      <label class="field">
        <span class="label">Concurrency</span>
        <input id="concurrency" type="number" value="16" />
      </label>

      <label class="field">
        <span class="label">CPU per Worker (%)</span>
        <input id="cpuPerWorker" type="number" value="30" />
      </label>

      <label class="field">
        <span class="label">Peak Factor</span>
        <select id="peak">
          <option value="1">1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
        </select>
      </label>

      <label class="field">
        <span class="label">Target Util (%)</span>
        <input id="targetUtil" type="number" value="70" />
      </label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Calculate</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>

    <div id="results" class="results"></div>

    <div id="chart-wrap" style="display:none; margin-top:16px;">
      <canvas id="chart" style="height:340px;"></canvas>
    </div>

    <div id="analysis" style="display:none; margin-top:14px;"></div>
  </section>

  <div id="continue-wrap" class="card" style="display:none;">
    <button id="continue" class="btn btn-primary">Continue → RAM</button>
  </div>

</main>

<script src="/assets/tool-flow.js"></script>
<script src="/assets/catalog.js"></script>
<script src="/assets/pipelines.js"></script>
<script src="/assets/pipeline.js"></script>
<script src="./script.js?v=003"></script>

</body>
</html>
