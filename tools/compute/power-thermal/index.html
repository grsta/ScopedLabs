  <h1>Compute Power & Thermal</h1>

  <div id="pipeline"></div>

  <p class="subhead">
    Convert system load into real-world power and cooling requirements.
  </p>

  <!-- FLOW CONTEXT -->
  <div id="flow-note" class="card" style="display:none;"></div>

  <section class="card">
    <p class="tool-best-for">
      <strong>Best for:</strong> validating rack power and cooling requirements before deployment.
    </p>
  </section>

  <!-- INPUTS -->
  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field">
        <span class="label">Nodes</span>
        <input id="nodes" type="number" value="10" />
      </label>

      <label class="field">
        <span class="label">Watts per Node</span>
        <input id="watts" type="number" value="450" />
      </label>

      <label class="field">
        <span class="label">Peak Factor</span>
        <select id="peak">
          <option value="1.0">1.0</option>
          <option value="1.15" selected>1.15</option>
          <option value="1.3">1.3</option>
          <option value="1.5">1.5</option>
        </select>
      </label>

      <label class="field">
        <span class="label">Overhead (%)</span>
        <input id="overhead" type="number" value="8" />
      </label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Calculate</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>
    <div id="results"><div class="muted">Run calculation.</div></div>
  </section>

  <div id="continue-wrap" class="card" style="display:none;">
    <button id="continue" class="btn btn-primary" disabled>
      Continue → RAID Rebuild
    </button>
  </div>
