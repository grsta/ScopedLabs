    <h1>RAID Rebuild Time</h1>

    <div id="pipeline"></div>

    <p class="subhead">
      Estimate rebuild duration and understand failure exposure during recovery.
    </p>

    <div id="flow-note" class="card" style="display:none;"></div>

    <section class="card">
      <p class="tool-best-for">
        <strong>Best for:</strong> evaluating how long your system remains vulnerable after a disk failure.
      </p>
    </section>

    <section class="card tool-card">
      <h2>Inputs</h2>

      <div class="form-grid">
        <label class="field">
          <span class="label">Drive Size (TB)</span>
          <input id="driveTb" type="number" min="0" step="0.1" value="16" />
        </label>

        <label class="field">
          <span class="label">Rebuild Speed (MB/s)</span>
          <input id="mbps" type="number" min="1" step="1" value="120" />
        </label>

        <label class="field">
          <span class="label">Array Utilization During Rebuild</span>
          <select id="load">
            <option value="0.5">Light (50% effective speed)</option>
            <option value="0.7" selected>Moderate (70% effective speed)</option>
            <option value="0.85">Heavy (85% effective speed)</option>
            <option value="1.0">Dedicated (100% effective speed)</option>
          </select>
        </label>

        <label class="field">
          <span class="label">RAID Type</span>
          <select id="raid">
            <option value="5" selected>RAID 5</option>
            <option value="6">RAID 6</option>
            <option value="10">RAID 10</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Verify / Scrub After Rebuild?</span>
          <select id="verify">
            <option value="no" selected>No</option>
            <option value="yes">Yes (adds extra pass)</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="calc" class="btn btn-primary">Calculate</button>
        <button id="reset" class="btn">Reset</button>
      </div>
    </section>

    <section class="card tool-card">
      <h2>Results</h2>
      <div id="results" class="results">
        <div class="muted">Enter values and press Calculate.</div>
      </div>
    </section>

    <div id="continue-wrap" class="card" style="display:none;">
      <button id="continue" class="btn btn-primary" disabled>
        Continue → Backup Window
      </button>
    </div>
