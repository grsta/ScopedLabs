<header class="site-header">

    <span class="sep">/</span>

  <h1>VM Density Estimator</h1>

  <div id="pipeline"></div>

  <p class="subhead">
    Combine CPU, memory, and storage constraints to estimate real VM capacity.
  </p>

  <!-- FLOW -->
  <div id="flow-note" class="card" style="display:none;"></div>

  <section class="card">
    <p class="tool-best-for">
      <strong>Best for:</strong> validating how many workloads a system can realistically support before hitting limits.
    </p>
  </section>

  <!-- INPUTS -->
  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field"><span class="label">Host CPU Cores</span><input id="hostCores" type="number" value="32" /></label>
      <label class="field"><span class="label">Host RAM (GB)</span><input id="hostRam" type="number" value="256" /></label>
      <label class="field"><span class="label">Reserved (GB)</span><input id="reserve" type="number" value="16" /></label>

      <label class="field"><span class="label">VM vCPU</span><input id="vmCpu" type="number" value="2" /></label>
      <label class="field"><span class="label">VM RAM (GB)</span><input id="vmRam" type="number" value="4" /></label>

      <label class="field"><span class="label">CPU Oversubscription</span><input id="cpuOver" type="number" value="3" /></label>
      <label class="field"><span class="label">RAM Overcommit</span><input id="ramOver" type="number" value="1.1" /></label>

      <label class="field"><span class="label">Spare (%)</span><input id="spare" type="number" value="15" /></label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Calculate</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>
    <div id="results"><div class="muted">Run calculation.</div></div>
  </section>

  <div id="continue-wrap" class="card" style="display:none;">
    <button id="continue" class="btn btn-primary" disabled>
      Continue → GPU / Power
    </button>
  </div>

</main>
