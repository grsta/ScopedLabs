<main class="container page">
  <div class="crumbs">
    <a href="/tools/">Tools</a> /
    <a href="/tools/infrastructure/">Infrastructure</a> /
    Equipment Spacing
  </div>

  <h1>Equipment Spacing Planner</h1>

  <div id="pipeline"></div>

  <p class="subhead">
    Estimate room layout, aisle spacing, and physical deployment footprint.
  </p>

  <div id="flow-note" class="card" style="display:none;"></div>

  <section class="card">
    <p class="tool-best-for">
      <strong>Best for:</strong> validating rack layout feasibility before final room design.
    </p>
  </section>

  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field"><span class="label">Rack Rows</span><input id="rows" type="number" value="2"></label>
      <label class="field"><span class="label">Racks per Row</span><input id="racksPer" type="number" value="6"></label>
      <label class="field"><span class="label">Rack Width (in)</span><input id="rackW" type="number" value="24"></label>
      <label class="field"><span class="label">Rack Depth (in)</span><input id="rackD" type="number" value="42"></label>
      <label class="field"><span class="label">Cold Aisle (in)</span><input id="cold" type="number" value="48"></label>
      <label class="field"><span class="label">Hot Aisle (in)</span><input id="hot" type="number" value="48"></label>
      <label class="field"><span class="label">End Clearance (in)</span><input id="end" type="number" value="36"></label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Calculate</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>
    <div id="results"><div class="muted">Run calculation.</div></div>
  </section>

  <div id="continue-wrap" class="card" style="display:none;">
    <button id="continue" class="btn btn-primary" disabled>
      Continue → Rack Weight Load
    </button>
  </div>
</main>
