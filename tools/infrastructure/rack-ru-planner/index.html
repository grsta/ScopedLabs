<main class="container page">
  <div class="crumbs">
    <a href="/tools/">Tools</a> /
    <a href="/tools/infrastructure/">Infrastructure</a> /
    Rack RU Planner
  </div>

  <h1>Rack RU Planner</h1>

  <div id="pipeline"></div>

  <p class="subhead">
    Plan rack utilization, reserve capacity, and understand real deployment limits.
  </p>

  <div id="flow-note" class="card" style="display:none;"></div>

  <section class="card">
    <p class="tool-best-for">
      <strong>Best for:</strong> validating rack capacity and avoiding overcommit before deployment.
    </p>
  </section>

  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field">
        <span class="label">Rack Total RU</span>
        <input id="total" type="number" value="42">
      </label>

      <label class="field">
        <span class="label">Used RU</span>
        <input id="used" type="number" value="18">
      </label>

      <label class="field">
        <span class="label">Growth Reserve (%)</span>
        <input id="reserve" type="number" value="20">
      </label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Calculate</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>
    <div id="results" class="results">
      <div class="muted">Run calculation.</div>
    </div>
  </section>

  <div id="continue-wrap" class="card" style="display:none;">
    <button id="continue" class="btn btn-primary" disabled>
      Continue → Equipment Spacing
    </button>
  </div>
