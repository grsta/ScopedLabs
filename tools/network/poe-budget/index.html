<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PoE Budget & Switch Margin Analyzer *ScopedLabs</title>

  <link rel="stylesheet" href="/assets/style.css?v=net-poe-001" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/auth.js?v=0401"></script>
  <script defer src="/assets/app.js?v=0401"></script>
</head>

<body 
  data-category="network"
  data-tool="poe-budget"
  data-step="1"
  data-lane="v1"
  data-tier="free"
>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">
      <span class="brand-mark"></span>
      <span class="brand-name">ScopedLabs</span>
    </a>
  </div>
</header>

<main class="page">
<div class="container">

<div id="pipeline"></div>

<div class="page-head">
  <h1 class="h1">PoE Budget & Switch Margin Analyzer</h1>
  <p class="subhead">
    Calculate total PoE load, safe operating budget, and headroom before deployment.
  </p>
</div>

<p class="tool-best-for">
Best for: validating switch PoE capacity before installation and preventing overload from IR, heaters, and peak draw conditions.
</p>

<section class="card tool-card">

<div class="form-grid">

<input id="poeBudgetW" type="number" value="370" />
<input id="marginPct" type="number" value="20" />
<input id="poePorts" type="number" value="16" />

<input id="camsCount" type="number" value="12" />
<input id="camsW" type="number" value="12" />

<input id="apsCount" type="number" value="2" />
<input id="apsW" type="number" value="15" />

<input id="phonesCount" type="number" value="0" />
<input id="phonesW" type="number" value="5" />

<input id="otherCount" type="number" value="0" />
<input id="otherW" type="number" value="10" />

</div>

<div class="actions">
  <button id="calc" class="btn primary">Calculate</button>
  <button id="continue" class="btn">Continue</button>
</div>

</section>

<section class="card tool-card">

<h2>Results</h2>

<div id="results"></div>

</section>

</div>
</main>

<!-- 🔥 LOCKED SCRIPT ORDER -->
<script src="/assets/tool-flow.js"></script>
<script src="/assets/pipelines.js"></script>
<script src="/assets/pipeline.js"></script>
<script src="./script.js"></script>

</body>
</html>
