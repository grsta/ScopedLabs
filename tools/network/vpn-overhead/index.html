<body data-tier="pro" data-category="network">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">

    <div class="crumbs">
      <a href="/tools/">Tools</a>

      <span>VPN Overhead</span>
    </div>

    <h1>VPN Overhead Estimator</h1>
    <p class="subhead">Estimate throughput and MTU impact caused by VPN encapsulation.</p>

    <section class="card tool-card">
      <h2>Inputs</h2>

      <div class="form-grid">
        <label class="field">
          <span class="label">Baseline Throughput (Mbps)</span>
          <input id="baseline" type="number" min="0" step="0.1" value="200" />
        </label>

        <label class="field">
          <span class="label">Encryption Type</span>
          <select id="enc">
            <option value="ipsec">IPsec</option>
            <option value="openvpn" selected>OpenVPN</option>
            <option value="wireguard">WireGuard</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Tunnel Mode</span>
          <select id="mode">
            <option value="udp" selected>UDP</option>
            <option value="tcp">TCP</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Hardware Offload?</span>
          <select id="offload">
            <option value="yes">Yes</option>
            <option value="no" selected>No</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="calc" class="btn btn-primary">Calculate</button>
        <button id="reset" class="btn">Reset</button>
      </div>
    </section>

    <section class="card tool-card">
      <h2>Results</h2>
      <div id="results" class="results">
        <div class="muted">Enter values and press Calculate.</div>
      </div>
    </section>
  </main>

<script src="./script.js"></script>
