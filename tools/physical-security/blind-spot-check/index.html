  <h1>Blind Spot Check</h1>
  <p class="subhead">Estimate whether spacing and field of view leave coverage gaps.</p>

  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field">
        <span class="label">Area Width (ft)</span>
        <input id="w" type="number" value="120">
      </label>

      <label class="field">
        <span class="label">Area Depth (ft)</span>
        <input id="d" type="number" value="80">
      </label>

      <label class="field">
        <span class="label">Camera Horizontal FOV (deg)</span>
        <input id="hfov" type="number" value="90">
      </label>

      <label class="field">
        <span class="label">Mounting Distance to Target Zone (ft)</span>
        <input id="dist" type="number" value="60">
      </label>

      <label class="field">
        <span class="label">Number of Cameras</span>
        <input id="cams" type="number" value="2">
      </label>

      <label class="field">
        <span class="label">Overlap Target (%)</span>
        <input id="overlap" type="number" value="15">
      </label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Check Coverage</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>
    <div id="results" class="results"></div>
  </section>
