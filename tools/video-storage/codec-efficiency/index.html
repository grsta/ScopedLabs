    <h1>Codec Efficiency Comparator</h1>
    <p class="subhead">Estimate bitrate and storage savings when moving between codecs.</p>
    <p class="tool-best-for">
    <strong>Best for:</strong> evaluating storage efficiency differences between encoding strategies.
    </p>

    <section class="card tool-card">
      <h2>Inputs</h2>

      <div class="form-grid">
        <label class="field">
          <span class="label">Baseline Bitrate (Mbps)</span>
          <input id="baseline" type="number" min="0" step="0.01" value="4.0" />
        </label>

        <label class="field">
          <span class="label">Current Codec</span>
          <select id="fromCodec">
            <option value="h264" selected>H.264</option>
            <option value="h265">H.265 / HEVC</option>
            <option value="vp9">VP9</option>
            <option value="av1">AV1</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Target Codec</span>
          <select id="toCodec">
            <option value="h264">H.264</option>
            <option value="h265" selected>H.265 / HEVC</option>
            <option value="vp9">VP9</option>
            <option value="av1">AV1</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Hours per Day</span>
          <input id="hours" type="number" min="0" step="0.1" value="24" />
        </label>

        <label class="field">
          <span class="label">Days of Retention</span>
          <input id="days" type="number" min="0" step="1" value="30" />
        </label>

        <label class="field">
          <span class="label">Camera Count</span>
          <input id="cams" type="number" min="1" step="1" value="8" />
        </label>
      </div>

      <div class="actions">
        <button id="calc" class="btn btn-primary">Calculate</button>
        <button id="reset" class="btn">Reset</button>
      </div>
    </section>

    <section class="card tool-card">
      <h2>Results</h2>
      <div id="results" class="results">
        <div class="muted">Enter values and press Calculate.</div>
      </div>
    </section>
  </main>

<script src="./script.js"></script>
