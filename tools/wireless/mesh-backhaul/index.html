  <h1>Mesh Backhaul Estimator</h1>

  <!-- REQUIRED -->
  <div id="pipeline"></div>

  <p class="subhead">Estimate effective throughput after mesh hops and overhead.</p>

  <!-- REQUIRED -->
  <div id="flow-note" class="card" style="display:none;"></div>

  <section class="card tool-card">
    <h2>Inputs</h2>

    <div class="form-grid">
      <label class="field">
        <span class="label">Base Link Throughput (Mbps)</span>
        <input id="base" type="number" value="600">
      </label>

      <label class="field">
        <span class="label">Mesh Hops</span>
        <input id="hops" type="number" value="2">
      </label>

      <label class="field">
        <span class="label">Protocol/Contention Overhead (%)</span>
        <input id="ovh" type="number" value="25">
      </label>

      <label class="field">
        <span class="label">Dedicated Backhaul Radio</span>
        <select id="ded">
          <option value="no" selected>No</option>
          <option value="yes">Yes</option>
        </select>
      </label>
    </div>

    <div class="actions">
      <button id="calc" class="btn btn-primary">Calculate</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </section>

  <section class="card tool-card">
    <h2>Results</h2>
    <div id="results" class="results"></div>
  </section>

  <!-- REQUIRED -->
  <div id="continue-wrap" class="card" style="display:none;">
    <button id="continue" class="btn btn-primary" disabled>
      Continue → PTP Wireless Link
    </button>
  </div>
